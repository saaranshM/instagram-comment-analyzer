taxonomy:
  id: phones
  name: "Smartphones"
  domain: phone
  group_label: brand
  item_label: model
  reject_words:
    - phone
    - mobile
    - device
    - bhai
    - bro
    - please
    - video
    - next
    - best
    - love
    - nice
    - cool
    - camera
    - battery
    - screen
    - display
    - black
    - white
    - blue
    - red
    - green
    - gold
    - silver
    - pro
    - max
    - ultra
  strip_prefixes:
    - "new "
    - "old "
    - "used "

